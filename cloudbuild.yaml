steps:
  # Build Docker image (NEXT_PUBLIC_* are baked in at build time via build-args).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/graffiticode-app/app:$_TAG'
      - '-t'
      - 'gcr.io/graffiticode-app/app:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_GC_API_URL=$_NEXT_PUBLIC_GC_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_GC_AUTH_URL=$_NEXT_PUBLIC_GC_AUTH_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_PRIVY_APP_ID=$_NEXT_PUBLIC_PRIVY_APP_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY'
      - '.'

  # Push image to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - 'gcr.io/graffiticode-app/app'
    id: Push

  # Deploy to Cloud Run. Server-side secrets (AUTH_SERVICE_INTERNAL_API_KEY,
  # PRIVY_APP_SECRET) and the Firestore service account are configured on the
  # service out-of-band, not here.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - run
      - deploy
      - app
      - '--platform=managed'
      - '--image=gcr.io/graffiticode-app/app:$_TAG'
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      # min-instances is managed manually on the service (service-level minScale),
      # so it's intentionally not set here — omitting the flag makes deploys
      # preserve the manual value instead of clobbering it.
      - '--max-instances=10'
      - '--port=8080'
      # Cross-app SSO: scope the shared refresh-token cookie to the parent domain
      # so console.graffiticode.org and app.graffiticode.org share one sign-in.
      # Use --update-env-vars (additive); --set-env-vars would wipe everything
      # else set out-of-band on the service.
      - '--update-env-vars=SSO_COOKIE_DOMAIN=.graffiticode.org'
      # Server secrets sourced from Secret Manager (create these once; see README/notes).
      - '--set-secrets=INTERNAL_API_KEY=INTERNAL_API_KEY:latest,PRIVY_APP_SECRET=PRIVY_APP_SECRET:latest'
    id: Deploy
    entrypoint: gcloud

images:
  - 'gcr.io/graffiticode-app/app:$_TAG'
  - 'gcr.io/graffiticode-app/app:latest'

options:
  substitutionOption: ALLOW_LOOSE

substitutions:
  _DEPLOY_REGION: us-central1
  _TAG: latest
  _NEXT_PUBLIC_GC_API_URL: https://api.graffiticode.org
  _NEXT_PUBLIC_GC_AUTH_URL: https://auth.graffiticode.org
  # Public client values (Privy app id + Firebase web key are not secrets).
  _NEXT_PUBLIC_PRIVY_APP_ID: cmom2ijrw00040cl4hd9qvjnq
  _NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyAoVuUNi8ElnS7cn6wc3D8XExML-URLw0I

tags:
  - app
